<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecommerco Touch POS</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <header>
      <h1>Ecommerco Touch POS</h1>
      <p>Card-present only: NFC tap, EMV insert, and manual keyed fallback.</p>
    </header>

    <section class="grid">
      <div class="panel">
        <h2>Product Catalog</h2>
        <div id="catalog" class="tiles"></div>
      </div>

      <div class="panel">
        <h2>Cart</h2>
        <div id="cart"></div>
        <h3 id="total">Total: AED 0.00</h3>
        <label>Reader ID<input id="readerId" placeholder="tmr_..." /></label>
        <label>Payment Type
          <select id="paymentMode">
            <option value="nfc">NFC Tap</option>
            <option value="emv">EMV Insert</option>
            <option value="manual">Manual Entry Fallback</option>
          </select>
        </label>
        <button id="payBtn" class="pay">Pay</button>
        <button id="refundBtn" class="refund">Refund Last</button>
        <p id="status">Ready</p>
      </div>

      <div class="panel">
        <h2>Receipt</h2>
        <div id="receipt">No completed transaction.</div>
        <button id="printBtn">Print Receipt</button>
        <h3>Transaction History</h3>
        <div id="history" class="history"></div>
      </div>
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
